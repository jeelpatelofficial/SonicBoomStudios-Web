<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sonicboom Studios Inc.</title>
  <style>
    :root {
      --bg-main: #03060a;
      --bg-mid: #07111f;
      --bg-deep: #030406;
      --text: rgba(255,255,255,0.96);
      --muted: rgba(255,255,255,0.75);
      --soft: rgba(255,255,255,0.45);
      --line: rgba(255,255,255,0.1);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-main);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      position: relative;
      background:
        radial-gradient(circle at top, rgba(91,160,255,0.12), transparent 32%),
        linear-gradient(135deg, var(--bg-main) 0%, var(--bg-mid) 50%, var(--bg-deep) 100%);
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.25;
      background-image:
        linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 64px 64px;
      z-index: 1;
    }

    .site {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .page-shell {
      position: absolute;
      inset: 0;
      transition: opacity 0.9s ease, transform 0.9s ease, filter 0.9s ease;
      z-index: 2;
    }

    .page-shell.hidden {
      opacity: 0;
      transform: scale(1.02);
      filter: blur(8px);
      pointer-events: none;
    }

    .page-shell.visible {
      opacity: 1;
      transform: scale(1);
      filter: blur(0);
    }

    .page-shell::before,
    .page-shell::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 18;
      pointer-events: none;
      opacity: 0;
    }

    .page-shell::before {
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.96) 0 1.5%, rgba(120,202,255,0.65) 2.5%, transparent 8%),
        repeating-conic-gradient(from 0deg, rgba(139,211,255,0.34) 0deg 2deg, transparent 2deg 10deg),
        radial-gradient(circle at center, transparent 0 34%, rgba(121,205,255,0.18) 35%, transparent 48%);
      mix-blend-mode: screen;
      transform: scale(0.12);
    }

    .page-shell::after {
      background:
        linear-gradient(rgba(255,255,255,0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.10) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(circle at center, #000 0 58%, transparent 75%);
      transform: scale(0.68);
    }

    .page-shell.assembling {
      animation: shellAssemble 1.55s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .page-shell.assembling::before {
      animation: assemblyShockwave 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.04s both;
    }

    .page-shell.assembling::after {
      animation: assemblyGrid 1.15s ease-out 0.08s both;
    }

    .page-shell.assembling .header {
      animation: headerAssemble 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.16s both;
    }

    .page-shell.assembling .main-stage {
      animation: stageAssemble 1.3s cubic-bezier(0.16, 1, 0.3, 1) 0.12s both;
    }

    .page-shell.assembling .slide {
      animation:
        enterUp 0.85s cubic-bezier(0.22, 1, 0.36, 1) forwards,
        imageAssemble 1.3s cubic-bezier(0.16, 1, 0.3, 1) 0.12s both;
    }

    .page-shell.assembling .content {
      animation: contentAssemble 0.95s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
    }

    .page-shell.assembling .footer {
      animation: footerAssemble 0.85s cubic-bezier(0.16, 1, 0.3, 1) 0.7s both;
    }

    .page-shell.assembling .hint {
      animation: hintAssemble 0.65s ease-out 1s both;
    }

    .header {
      position: absolute;
      z-index: 30;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 24px;
    }

    .eyebrow {
      font-size: 10px;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 10px;
    }

    .brand {
      font-size: clamp(18px, 2vw, 24px);
      font-weight: 600;
      letter-spacing: 0.24em;
    }

    .desktop-only { display: none; }

    .pill {
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      border-radius: 999px;
      padding: 11px 16px;
      font-size: 12px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      backdrop-filter: blur(8px);
    }

    .main-stage {
      position: absolute;
      inset: 88px 0 0 0;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      will-change: transform, opacity;
      animation: enterUp 0.85s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .slide.slide-down { animation-name: enterDown; }

    .slide-bg,
    .slide-floaters,
    .slide-noise,
    .slide-scan,
    .slide-v1,
    .slide-v2,
    .slide-v3,
    .slide-glow,
    .slide-beam-a,
    .slide-beam-b,
    .slide-rings {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .slide-glow {
      inset: auto;
      left: 50%;
      top: 50%;
      width: 34rem;
      height: 34rem;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      filter: blur(48px);
      animation: pulseGlow 4.2s ease-in-out infinite;
    }

    .slide-rings {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide-ring {
      position: absolute;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50%;
      animation: ringPulse 3s ease-in-out infinite;
    }

    .slide-beam-a {
      left: -10%;
      right: -10%;
      top: 50%;
      height: 6rem;
      transform: translateY(-50%);
      transform-origin: center;
      opacity: 0.8;
      filter: blur(16px);
      animation: beamA 3.4s ease-in-out infinite;
    }

    .slide-beam-b {
      left: -10%;
      right: -10%;
      top: 50%;
      height: 1.5rem;
      transform: translateY(-50%);
      transform-origin: center;
      opacity: 0.95;
      animation: beamB 2.6s ease-in-out infinite;
    }

    .slide-noise {
      opacity: 0.4;
      mix-blend-mode: screen;
      background: repeating-radial-gradient(circle at center, rgba(255,255,255,0.18) 0px, rgba(255,255,255,0.03) 2px, transparent 22px);
    }

    .slide-scan {
      opacity: 0.2;
      background-image: linear-gradient(transparent 96%, rgba(255,255,255,0.16) 100%);
      background-size: 100% 10px;
    }

    .slide-v1 {
      background: linear-gradient(180deg, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0.04) 35%, rgba(0,0,0,0.55) 100%);
    }

    .slide-v2 {
      background: radial-gradient(circle at center, transparent 58%, rgba(4,7,13,0.14) 72%, rgba(4,7,13,0.52) 88%, rgba(4,7,13,0.92) 100%);
    }

    .slide-v3 {
      background: radial-gradient(circle at center, transparent 12%, rgba(0,0,0,0.38) 72%);
      box-shadow: inset 0 0 140px rgba(0,0,0,0.75);
    }

    .content {
      position: absolute;
      z-index: 20;
      top: 112px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
    }

    .copy-wrap { max-width: 48rem; }

    .tag-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      color: rgba(255,255,255,0.8);
    }

    .tag-pill {
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.2);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
    }

    .tag-label {
      font-size: 12px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
    }

    .copy-enter { animation: copyIn 0.55s ease forwards; }
    .copy-enter.copy-down { animation-name: copyInDown; }

    .hero-title {
      max-width: 8ch;
      margin: 0;
      font-size: clamp(3.2rem, 10vw, 7rem);
      line-height: 0.88;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .hero-subtitle {
      margin-top: 20px;
      max-width: 32rem;
      font-size: 16px;
      line-height: 1.8;
      color: rgba(255,255,255,0.75);
    }

    .info-card {
      max-width: 14rem;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 1.5rem;
      background: rgba(0,0,0,0.2);
      padding: 16px;
      backdrop-filter: blur(14px);
    }

    .info-icon {
      font-size: 32px;
      margin-bottom: 16px;
    }

    .info-title {
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 10px;
    }

    .info-copy {
      font-size: 14px;
      line-height: 1.7;
      color: rgba(255,255,255,0.8);
    }

    .footer {
      position: absolute;
      z-index: 20;
      left: 20px;
      right: 20px;
      bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 20px;
    }

    .progress {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .progress-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .progress-line {
      height: 2px;
      width: 32px;
      border-radius: 999px;
      background: rgba(255,255,255,0.25);
      transition: width 0.5s ease, background 0.5s ease;
    }

    .progress-item.active .progress-line {
      width: 56px;
      background: rgba(255,255,255,1);
    }

    .progress-num {
      font-size: 10px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      transition: color 0.5s ease;
    }

    .progress-item.active .progress-num {
      color: rgba(255,255,255,0.9);
    }

    .mark { text-align: right; }

    .mark-a {
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 8px;
    }

    .mark-b {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
    }

    /* ── Contact Modal ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }
    .modal-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      width: 100%;
      max-width: 480px;
      background: rgba(7,17,31,0.95);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 1.5rem;
      padding: 36px 32px 32px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
      transform: translateY(24px) scale(0.97);
      transition: transform 0.35s cubic-bezier(0.22,1,0.36,1);
      position: relative;
    }
    .modal-backdrop.open .modal {
      transform: translateY(0) scale(1);
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.6);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .modal-close:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .modal-eyebrow {
      font-size: 10px;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 8px;
    }
    .modal-title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #fff;
      margin-bottom: 24px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 7px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 0.75rem;
      padding: 12px 14px;
      color: rgba(255,255,255,0.9);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      resize: none;
      box-sizing: border-box;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      border-color: rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.08);
    }
    .form-group input::placeholder,
    .form-group textarea::placeholder { color: rgba(255,255,255,0.25); }
    .form-submit {
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      border-radius: 0.75rem;
      border: none;
      background: #fff;
      color: #03060a;
      font-size: 12px;
      font-family: inherit;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    .form-submit:hover { background: rgba(255,255,255,0.88); }
    .form-submit:disabled { opacity: 0.5; cursor: default; }
    .form-feedback {
      margin-top: 14px;
      font-size: 13px;
      text-align: center;
      min-height: 20px;
      color: rgba(255,255,255,0.6);
    }
    .form-feedback.success { color: #6ee7b7; }
    .form-feedback.error { color: #fca5a5; }

    .hint {
      position: absolute;
      z-index: 25;
      left: 50%;
      bottom: 96px;
      transform: translateX(-50%);
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.25);
      border-radius: 999px;
      padding: 14px 20px;
      font-size: 12px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      backdrop-filter: blur(14px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .hint.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(10px);
    }

    .loader {
      position: absolute;
      inset: 0;
      z-index: 120;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: opacity 0.7s ease, visibility 0.7s ease, transform 0.7s ease;
    }

    .loader.visible {
      opacity: 1;
      visibility: visible;
    }

    .loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader.exiting .loader-stage {
      animation: loaderStageCollapse 1.05s cubic-bezier(0.8, 0, 0.2, 1) both;
    }

    .loader.exiting .loader-bg {
      animation: loaderBackdropCollapse 1.05s cubic-bezier(0.8, 0, 0.2, 1) both;
    }

    .loader.exiting .loader-glow {
      animation: loaderGlowCollapse 1.05s cubic-bezier(0.8, 0, 0.2, 1) both;
    }

    .loader.exiting .loader-particle-shell {
      animation: loaderShellCollapse 1.05s cubic-bezier(0.8, 0, 0.2, 1) both;
    }

    .loader.exiting .loader-copy {
      animation: loaderCopyCollapse 0.55s ease-in both;
    }

    .loader::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      background: radial-gradient(circle, #fff 0%, #dff6ff 24%, rgba(44,150,255,0.82) 48%, transparent 72%);
      box-shadow:
        0 0 34px rgba(255,255,255,0.96),
        0 0 110px rgba(69,164,255,0.82),
        0 0 210px rgba(39,105,255,0.54);
      transform: translate(-50%, -50%) scale(0.4);
    }

    .loader.exiting::after {
      animation: loaderImpactCore 1.05s cubic-bezier(0.8, 0, 0.2, 1) both;
    }

    .loader-bg {
      position: absolute;
      inset: 0;
      background: #000;
    }

    .loader-glow {
      position: absolute;
      width: min(86vw, 52rem);
      height: min(86vw, 52rem);
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(214,241,255,0.16) 0%, rgba(55,145,255,0.08) 30%, transparent 66%),
        conic-gradient(from 90deg, transparent, rgba(103,232,249,0.08), transparent 34%, rgba(80,135,255,0.09), transparent 70%);
      filter: blur(22px);
      opacity: 0;
      animation: loaderGlowPulse 5.6s ease-out forwards;
    }

    .loader-stage {
      position: absolute;
      inset: 0;
      z-index: 2;
      transition: transform 0.7s ease, filter 0.7s ease;
    }

    .loader-particle-shell {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(78vw, 760px);
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      isolation: isolate;
    }

    .sonic-axis,
    .sonic-core,
    .sonic-ring,
    .sonic-tunnel,
    .sonic-flare {
      position: absolute;
      inset: 0;
      margin: auto;
      pointer-events: none;
      transform: none;
    }

    .sonic-axis {
      width: min(68vw, 660px);
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(130,205,255,0.45) 48%, rgba(255,255,255,0.95) 50%, rgba(130,205,255,0.45) 52%, transparent 100%);
      box-shadow: 0 0 28px rgba(99,179,255,0.55);
      opacity: 0;
      z-index: 1;
      animation: sonicAxis 5.6s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    .sonic-tunnel {
      width: min(76vw, 680px);
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255,255,255,0.22) 0 1.5%, transparent 2.5%),
        repeating-radial-gradient(circle, transparent 0 9%, rgba(114,196,255,0.11) 9.5%, transparent 11.5%);
      mask-image: radial-gradient(circle, #000 0 68%, transparent 72%);
      opacity: 0;
      z-index: 1;
      animation: sonicTunnel 5.6s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    .sonic-core {
      width: clamp(42px, 8vw, 78px);
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(205,238,255,0.96) 18%, rgba(72,170,255,0.42) 42%, transparent 68%);
      box-shadow:
        0 0 32px rgba(255,255,255,0.8),
        0 0 88px rgba(65,160,255,0.58),
        0 0 150px rgba(37,101,220,0.32);
      z-index: 2;
      animation: sonicCore 5.6s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    .sonic-singularity {
      position: absolute;
      inset: 0;
      margin: auto;
      width: clamp(14px, 2.4vw, 24px);
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(188,231,255,0.94) 38%, rgba(45,136,255,0.24) 68%, transparent 100%);
      box-shadow: none;
      z-index: 5;
      opacity: 0;
      transform: none;
      animation: singularityWiggle 5.6s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    .sonic-singularity::before,
    .sonic-singularity::after {
      display: none;
    }

    .sonic-singularity::after {
      display: none;
    }

    .sonic-ring {
      display: none;
    }

    .sonic-flare {
      width: min(82vw, 720px);
      height: min(82vw, 720px);
      border-radius: 50%;
      background:
        conic-gradient(from 12deg, transparent 0deg, rgba(132,212,255,0.18) 18deg, transparent 32deg, transparent 70deg, rgba(255,255,255,0.14) 82deg, transparent 96deg, transparent 180deg, rgba(80,145,255,0.16) 198deg, transparent 216deg, transparent 292deg, rgba(175,231,255,0.14) 306deg, transparent 322deg);
      filter: blur(1px);
      mix-blend-mode: screen;
      opacity: 0;
      z-index: 1;
      animation: sonicFlare 5.6s ease-in-out forwards;
    }

    .loader-particle-field {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .loader-particle {
      position: absolute;
      left: 50%;
      top: 50%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(140,190,255,0.95) 45%, rgba(78,129,255,0.18) 100%);
      box-shadow: 0 0 14px rgba(126, 184, 255, 0.7);
      transform: translate3d(var(--dx), var(--dy), 0) scale(0.2);
      opacity: 0;
      animation-name: loaderParticleLoop;

<!-- Contact Modal -->

  <script>
    const LOGO_SRC = "images/sonicboom_logo.png";

    const slides = [
      {
        title: "Sky Dynasty",
        subtitle: "Sky Dynasty is a single-player airplane racing action game in which players pilot and customize aircraft through dangerous routes while climbing a competitive ladder to become the top racer with the best-performing plane. Set in an underground aerial racing world shaped by rival pilots, pursuit, and a hidden supernatural threat, the game centers on two core mechanics: aircraft performance modification and high-risk rival races. Players adjust how their aircraft handles by balancing speed, stability, responsiveness, and recovery, then take that machine into increasingly demanding events. The main objective is to climb the racing ladder, defeat major rivals, and survive the escalating dangers surrounding the circuit by combining preparation, route mastery, and fast decision-making.",
        tag: "01",
        icon: "⚡",
        image: "images/skydynasty_frame.png",
        accent: "linear-gradient(135deg, rgba(34,211,238,0.30), rgba(59,130,246,0.20), transparent 72%)",
        glow: "rgba(103,232,249,0.25)",
        band: "linear-gradient(90deg, #67e8f9, #3b82f6, #4f46e5)",
        accentRGB: [103, 232, 249],
      },
      {
        title: "Whispers Of Steel",
        subtitle: "A studio language tuned for impact.",
        tag: "02",
        icon: "◉",
        image: "images/whispersofsteel_frame.png",
        accent: "linear-gradient(135deg, rgba(252,211,77,0.25), rgba(249,115,22,0.20), transparent 72%)",
        glow: "rgba(253,230,138,0.20)",
        band: "linear-gradient(90deg, #fcd34d, #f97316, #ef4444)",
        accentRGB: [253, 200, 80],
      },
      {
        title: "Starlight Heavens",
        subtitle: "Frames built like sonic pressure.",
        tag: "03",
        icon: "✈",
        image: "images/starlightheavens_frame.png",
        accent: "linear-gradient(135deg, rgba(167,139,250,0.25), rgba(217,70,239,0.20), transparent 72%)",
        glow: "rgba(196,181,253,0.25)",
        band: "linear-gradient(90deg, #a78bfa, #d946ef, #ec4899)",
        accentRGB: [196, 140, 255],
      },
      {
        title: "Afterburn",
        subtitle: "Memorable worlds, sharp silhouettes, infinite lift.",
        tag: "04",
        icon: "✦",
        accent: "linear-gradient(135deg, rgba(110,231,183,0.25), rgba(20,184,166,0.20), transparent 72%)",
        glow: "rgba(167,243,208,0.20)",
        band: "linear-gradient(90deg, #6ee7b7, #14b8a6, #06b6d4)",
        accentRGB: [110, 231, 183],
      },
    ];


    const mainStage = document.getElementById('mainStage');
    const pageShell = document.getElementById('pageShell');
    const loader = document.getElementById('loader');
    const hint = document.getElementById('hint');
    const slideTag = document.getElementById('slideTag');
    const slideTitle = document.getElementById('slideTitle');
    const slideSubtitle = document.getElementById('slideSubtitle');
    const progress = document.getElementById('progress');
    const copyBlock = document.getElementById('copyBlock');
    const loaderLogo = document.getElementById('loaderLogo');
    const loaderParticles = document.getElementById('loaderParticles');

    loaderLogo.src = LOGO_SRC;

    // ── Layered Particle System ──
    (function () {
      const loaderEl = document.getElementById('loader');
      const cvs = document.createElement('canvas');
      cvs.setAttribute('aria-hidden', 'true');
      cvs.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none;';
      loaderEl.appendChild(cvs);
      const ctx = cvs.getContext('2d');

      const boomCycle = 5600;
      let boomW = 0, boomH = 0, boomCX = 0, boomCY = 0, boomDiag = 0, boomDpr = 1;
      let boomStart = null;
      let boomParticles = [];
      let boomShards = [];

      function sonicResize() {
        boomDpr = Math.min(window.devicePixelRatio || 1, 2);
        boomW = loaderEl.offsetWidth || window.innerWidth;
        boomH = loaderEl.offsetHeight || window.innerHeight;
        boomCX = boomW / 2;
        boomCY = boomH / 2;
        boomDiag = Math.hypot(boomW, boomH);
        cvs.width = Math.round(boomW * boomDpr);
        cvs.height = Math.round(boomH * boomDpr);
        cvs.style.width = `${boomW}px`;
        cvs.style.height = `${boomH}px`;
        ctx.setTransform(boomDpr, 0, 0, boomDpr, 0, 0);
      }

      function buildBoom() {
        boomParticles = Array.from({ length: 680 }, (_, i) => {
          const spoke = (i % 96) / 96;
          const angle = spoke * Math.PI * 2 + (Math.random() - 0.5) * 0.2;
          const longRay = Math.random() > 0.58;
          return {
            angle,
            delay: 2050 + Math.random() * 760,
            life: 2300 + Math.random() * 1850,
            speed: (longRay ? 0.34 : 0.2) + Math.random() * (longRay ? 0.32 : 0.18),
            drift: (Math.random() - 0.5) * 0.015,
            radius: Math.pow(Math.random(), 1.9) * 2.4 + 0.45,
            trail: longRay ? 34 + Math.random() * 70 : 10 + Math.random() * 24,
            alpha: longRay ? 0.9 : 0.55,
            hue: Math.random(),
          };
        });

        boomShards = Array.from({ length: 42 }, () => ({
          angle: Math.random() * Math.PI * 2,
          delay: 2000 + Math.random() * 640,
          life: 900 + Math.random() * 1400,
          speed: 0.28 + Math.random() * 0.34,
          width: 26 + Math.random() * 72,
          alpha: 0.16 + Math.random() * 0.24,
        }));
      }

      function easeOutExpo(x) {
        return x === 1 ? 1 : 1 - Math.pow(2, -10 * x);
      }

      function easeOutCubic(x) {
        return 1 - Math.pow(1 - x, 3);
      }

      function clamp01(x) {
        return Math.max(0, Math.min(1, x));
      }

      function boomColor(hue, alpha) {
        const blue = [74, 154, 255];
        const cyan = [142, 231, 255];
        const white = [255, 255, 255];
        const mixA = hue < 0.62 ? cyan : white;
        const f = hue < 0.62 ? hue / 0.62 : (hue - 0.62) / 0.38;
        const base = hue < 0.62 ? blue : cyan;
        const r = Math.round(base[0] + (mixA[0] - base[0]) * f);
        const g = Math.round(base[1] + (mixA[1] - base[1]) * f);
        const b = Math.round(base[2] + (mixA[2] - base[2]) * f);
        return `rgba(${r},${g},${b},${alpha})`;
      }

      function drawSonicRing(radius, alpha, width) {
        if (alpha <= 0 || radius <= 0) return;
        ctx.beginPath();
        ctx.arc(boomCX, boomCY, radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(196,232,255,${alpha})`;
        ctx.lineWidth = width;
        ctx.stroke();
      }

      function drawPressureLens(localT) {
        const blastT = Math.max(0, localT - 1900);
        if (blastT <= 0) return;
        const burst = easeOutExpo(clamp01(blastT / 1350));
        const settle = 1 - clamp01((localT - 3600) / 1600);
        const lensAlpha = Math.max(0, 0.3 * Math.sin(clamp01(blastT / 1800) * Math.PI) + 0.08 * settle);
        const lensRadius = boomDiag * (0.05 + burst * 0.28);
        const lens = ctx.createRadialGradient(boomCX, boomCY, 0, boomCX, boomCY, lensRadius);
        lens.addColorStop(0, `rgba(255,255,255,${0.2 * lensAlpha})`);
        lens.addColorStop(0.18, `rgba(141,218,255,${0.42 * lensAlpha})`);
        lens.addColorStop(0.42, `rgba(60,145,255,${0.26 * lensAlpha})`);
        lens.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = lens;
        ctx.fillRect(0, 0, boomW, boomH);

        drawSonicRing(boomDiag * (0.025 + burst * 0.36), 0.78 * (1 - clamp01(blastT / 1900)), 2.2);
      }

      function sonicFrame(ts) {
        requestAnimationFrame(sonicFrame);
        if (!boomW || !boomH) sonicResize();
        if (boomStart === null) {
          boomStart = ts;
          buildBoom();
        }

        const localT = Math.min(ts - boomStart, boomCycle);
        ctx.clearRect(0, 0, boomW, boomH);

        const universeT = easeOutCubic(clamp01((localT - 2100) / 2400));
        if (universeT > 0) {
          const bg = ctx.createRadialGradient(boomCX, boomCY, 0, boomCX, boomCY, boomDiag * 0.55);
          bg.addColorStop(0, `rgba(9,28,55,${0.32 * universeT})`);
          bg.addColorStop(0.48, `rgba(4,12,24,${0.2 * universeT})`);
          bg.addColorStop(1, 'rgba(2,4,10,0)');
          ctx.fillStyle = bg;
          ctx.fillRect(0, 0, boomW, boomH);
        }

        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        drawPressureLens(localT);

        boomShards.forEach((s) => {
          const age = localT - s.delay;
          if (age <= 0 || age > s.life) return;
          const p = clamp01(age / s.life);
          const d = easeOutCubic(p) * boomDiag * s.speed;
          const fade = Math.sin(p * Math.PI) * s.alpha;
          const x = boomCX + Math.cos(s.angle) * d;
          const y = boomCY + Math.sin(s.angle) * d;
          const tx = Math.cos(s.angle) * s.width;
          const ty = Math.sin(s.angle) * s.width;
          ctx.beginPath();
          ctx.moveTo(x - tx * 0.25, y - ty * 0.25);
          ctx.lineTo(x + tx, y + ty);
          ctx.strokeStyle = `rgba(169,225,255,${fade})`;
          ctx.lineWidth = 1;
          ctx.stroke();
        });

        boomParticles.forEach((p) => {
          const age = localT - p.delay;
          if (age <= 0 || age > p.life) return;
          const lifeP = clamp01(age / p.life);
          const launch = easeOutExpo(lifeP);
          const angle = p.angle + Math.sin(lifeP * Math.PI * 2) * p.drift;
          const distance = launch * boomDiag * p.speed;
          const originPull = Math.max(0, 1 - lifeP * 2.8);
          const x = boomCX + Math.cos(angle) * distance;
          const y = boomCY + Math.sin(angle) * distance;
          const tail = p.trail * (0.4 + launch * 1.2);
          const tx = Math.cos(angle) * tail;
          const ty = Math.sin(angle) * tail;
          const alpha = Math.sin(lifeP * Math.PI) * p.alpha * (0.35 + 0.65 * launch);

          ctx.beginPath();
          ctx.moveTo(boomCX + Math.cos(angle) * originPull * 20, boomCY + Math.sin(angle) * originPull * 20);
          ctx.lineTo(x, y);
          ctx.strokeStyle = boomColor(p.hue, alpha * 0.12);
          ctx.lineWidth = Math.max(0.45, p.radius * 0.35);
          ctx.stroke();

          const grad = ctx.createLinearGradient(x - tx, y - ty, x, y);
          grad.addColorStop(0, boomColor(p.hue, 0));
          grad.addColorStop(0.68, boomColor(p.hue, alpha * 0.28));
          grad.addColorStop(1, boomColor(p.hue, alpha));
          ctx.beginPath();
          ctx.moveTo(x - tx, y - ty);
          ctx.lineTo(x, y);
          ctx.strokeStyle = grad;
          ctx.lineWidth = p.radius;
          ctx.stroke();

          const spark = ctx.createRadialGradient(x, y, 0, x, y, p.radius * 5);
          spark.addColorStop(0, `rgba(255,255,255,${alpha * 0.7})`);
          spark.addColorStop(0.34, boomColor(p.hue, alpha * 0.42));
          spark.addColorStop(1, boomColor(p.hue, 0));
          ctx.fillStyle = spark;
          ctx.beginPath();
          ctx.arc(x, y, p.radius * 5, 0, Math.PI * 2);
          ctx.fill();
        });

        const corePulse = 0.62 + 0.38 * Math.sin((localT / boomCycle) * Math.PI * 2);
        const coreAlpha = clamp01((localT - 1850) / 850);
        const core = ctx.createRadialGradient(boomCX, boomCY, 0, boomCX, boomCY, 110 + corePulse * 42);
        core.addColorStop(0, `rgba(255,255,255,${coreAlpha * (0.38 + corePulse * 0.18)})`);
        core.addColorStop(0.16, `rgba(184,232,255,${coreAlpha * (0.26 + corePulse * 0.14)})`);
        core.addColorStop(0.42, `rgba(77,157,255,${coreAlpha * (0.1 + corePulse * 0.08)})`);
        core.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = core;
        ctx.fillRect(0, 0, boomW, boomH);
        ctx.restore();
      }

      sonicResize();
      window.addEventListener('resize', sonicResize);
      requestAnimationFrame(sonicFrame);
      return;

      let W = 0, H = 0, CX = 0, CY = 0, booted = false;

      function resize() {
        W = cvs.width  = loaderEl.offsetWidth  || window.innerWidth;
        H = cvs.height = loaderEl.offsetHeight || window.innerHeight;
        CX = W / 2; CY = H / 2;
      }
      resize();
      window.addEventListener('resize', () => { resize(); booted = false; });

      // ── Colour palette (cycles over 16 s) ──
      const PAL = [
        [ 40, 110, 255],  // electric blue
        [ 70, 185, 255],  // sky
        [120, 225, 255],  // cyan
        [ 55, 145, 235],  // ocean
        [100, 170, 255],  // periwinkle
        [ 30,  90, 220],  // deep navy
      ];
      function mix(a, b, f) {
        return [a[0]+(b[0]-a[0])*f, a[1]+(b[1]-a[1])*f, a[2]+(b[2]-a[2])*f];
      }
      function palCol(t) {
        const ct = (t % 16) / 16;
        const ci = Math.floor(ct * PAL.length);
        return mix(PAL[ci % PAL.length], PAL[(ci+1) % PAL.length], (ct * PAL.length) % 1);
      }

      // ── Flow-field (curl-noise approximation) ──
      // Returns [vx, vy] direction at pixel (x,y) at time t (seconds)
      function field(x, y, t) {
        const s = 0.0032, s2 = 0.0018;
        const vx =  Math.sin(y * s  + t * 0.38) + 0.55 * Math.sin(x * s2 + t * 0.22)
                  + 0.28 * Math.cos((x + y) * s2 * 0.7 + t * 0.14);
        const vy =  Math.cos(x * s  + t * 0.31) + 0.55 * Math.cos(y * s2 + t * 0.26)
                  + 0.28 * Math.sin((x - y) * s2 * 0.7 + t * 0.19);
        return [vx, vy];
      }

      // ── LAYER 1 — Background star-field (360 tiny fixed points) ──
      const STARS = Array.from({length: 360}, () => ({
        nx: Math.random(), ny: Math.random(),
        r:  Math.random() * 1.1 + 0.25,
        a0: Math.random() * 0.45 + 0.12,
        tw: Math.random() * Math.PI * 2,
        ts: Math.random() * 1.2 + 0.4,
      }));

      // ── LAYER 2 — Flow-field particles with velocity trails (480) ──
      function makeFlow() {
        return {
          x: Math.random(), y: Math.random(),   // normalised; converted in boot()
          vx: 0, vy: 0,
          r:   Math.pow(Math.random(), 1.8) * 2.8 + 0.6,
          a0:  Math.random() * 0.55 + 0.18,
          spd: Math.random() * 0.9 + 0.35,
          hist: [],
          hLen: Math.floor(Math.random() * 10 + 5),
          delay: Math.random() * 2000,           // staggered start (ms)
          hShift: (Math.random() - 0.5) * 40,
        };
      }
      const FLOW = Array.from({length: 480}, makeFlow);

      // ── LAYER 3 — Large glowing orbs (42) ──
      function makeOrb() {
        const ang = Math.random() * Math.PI * 2;
        const rn  = Math.pow(Math.random(), 0.45) * 0.48;
        return {
          bx: 0.5 + Math.cos(ang) * rn * 0.88,
          by: 0.5 + Math.sin(ang) * rn * 0.72,
          r:  Math.random() * 16 + 8,
          a0: Math.random() * 0.42 + 0.14,
          oR: Math.random() * 65 + 20,           // orbit radius px
          oS: (Math.random() * 0.28 + 0.08) * (Math.random() < 0.5 ? 1 : -1),
          oP: Math.random() * Math.PI * 2,
          pS: Math.random() * 1.1 + 0.35,        // pulse speed
          pP: Math.random() * Math.PI * 2,
          hShift: (Math.random() - 0.5) * 55,
        };
      }
      const ORBS = Array.from({length: 42}, makeOrb);

      // ── Nebula fog patches — large blurred gradient clouds for depth ──
      const NEBULA = Array.from({length: 9}, () => ({
        nx:     Math.random(),
        ny:     Math.random(),
        r:      Math.random() * 160 + 90,   // radius px
        a0:     Math.random() * 0.055 + 0.018,
        dx:     (Math.random() - 0.5) * 7,  // drift px/s
        dy:     (Math.random() - 0.5) * 4.5,
        hShift: (Math.random() - 0.5) * 70,
        pP:     Math.random() * Math.PI * 2,
        pS:     Math.random() * 0.15 + 0.04,
      }));

      // ── Shockwave rings ──
      const RINGS = [];
      let lastRing = -9999;
      const RING_INTERVAL = 3400;

      // ── First-frame boot: convert normalised coords to px ──
      function boot() {
        FLOW.forEach(p => { p.x = p.x * W; p.y = p.y * H; p.hist = []; });
        booted = true;
      }

      // ── Main render loop ──
      function frame(ts) {
        requestAnimationFrame(frame);
        if (!W || !H) return;
        if (!booted) boot();

        const t   = ts * 0.001;
        const col = palCol(t);
        const [cr, cg, cb] = col.map(Math.round);
        const MIND = Math.min(W, H);

        // Fade trail — dark tint matching loader background
        ctx.fillStyle = 'rgba(2,4,10,0.20)';
        ctx.fillRect(0, 0, W, H);

        // ── Nebula fog ─────────────────────────────────────────
        ctx.save();
        ctx.globalCompositeOperation = 'source-over';
        NEBULA.forEach(n => {
          const nx  = ((n.nx * W + t * n.dx) % W + W) % W;
          const ny  = ((n.ny * H + t * n.dy) % H + H) % H;
          const pls = 0.62 + 0.38 * Math.sin(t * n.pS + n.pP);
          const a   = n.a0 * pls;
          const r   = Math.min(255, Math.max(0, cr + n.hShift * 0.50)) | 0;
          const g   = Math.min(255, Math.max(0, cg + n.hShift * 0.28)) | 0;
          const b   = Math.min(255, Math.max(0, cb + n.hShift * 0.10)) | 0;
          const gd  = ctx.createRadialGradient(nx, ny, 0, nx, ny, n.r);
          gd.addColorStop(0,   `rgba(${r},${g},${b},${a})`);
          gd.addColorStop(0.55,`rgba(${r},${g},${b},${a * 0.28})`);
          gd.addColorStop(1,    'rgba(0,0,0,0)');
          ctx.beginPath();
          ctx.arc(nx, ny, n.r, 0, Math.PI * 2);
          ctx.fillStyle = gd;
          ctx.fill();
        });
        ctx.restore();

        // ── Stars ──────────────────────────────────────────────
        ctx.save();
        ctx.globalCompositeOperation = 'source-over';
        STARS.forEach(s => {
          const tw = 0.5 + 0.5 * Math.sin(t * s.ts + s.tw);
          ctx.beginPath();
          ctx.arc(s.nx * W, s.ny * H, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(185,215,255,${s.a0 * tw})`;
          ctx.fill();
        });
        ctx.restore();

        // ── Flow field particles ───────────────────────────────
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        FLOW.forEach(p => {
          if (ts < p.delay) return;

          const [fx, fy] = field(p.x, p.y, t);
          p.vx = p.vx * 0.86 + fx * p.spd * 0.14;
          p.vy = p.vy * 0.86 + fy * p.spd * 0.14;
          p.x += p.vx;
          p.y += p.vy;

          // Seamless wrap
          if (p.x < -12) p.x = W + 12;
          else if (p.x > W + 12) p.x = -12;
          if (p.y < -12) p.y = H + 12;
          else if (p.y > H + 12) p.y = -12;

          p.hist.push({x: p.x, y: p.y});
          if (p.hist.length > p.hLen) p.hist.shift();

          // Distance-based brightness
          const dd = Math.hypot(p.x - CX, p.y - CY);
          const bf = Math.max(0.08, 1 - dd / (MIND * 0.7));

          const r = Math.min(255, Math.max(0, cr + p.hShift * 0.5)) | 0;
          const g = Math.min(255, Math.max(0, cg + p.hShift * 0.25)) | 0;
          const b = Math.min(255, Math.max(0, cb + p.hShift * 0.1)) | 0;

          // Velocity trail
          if (p.hist.length > 1) {
            for (let i = 1; i < p.hist.length; i++) {
              const prog  = i / p.hist.length;
              const ta    = prog * prog * p.a0 * bf * 0.28;
              const prev  = p.hist[i - 1];
              const cur   = p.hist[i];
              ctx.beginPath();
              ctx.moveTo(prev.x, prev.y);
              ctx.lineTo(cur.x, cur.y);
              ctx.strokeStyle = `rgba(${r},${g},${b},${ta})`;
              ctx.lineWidth   = p.r * prog;
              ctx.stroke();
            }
          }

          // Glowing head (additive radial)
          const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4);
          glow.addColorStop(0,    `rgba(255,255,255,${p.a0 * bf * 0.85})`);
          glow.addColorStop(0.25, `rgba(${r},${g},${b},${p.a0 * bf * 0.55})`);
          glow.addColorStop(1,    `rgba(${r},${g},${b},0)`);
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r * 4, 0, Math.PI * 2);
          ctx.fillStyle = glow;
          ctx.fill();
        });
        ctx.restore();

        // ── Large orbs ────────────────────────────────────────
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ORBS.forEach(o => {
          const ox = Math.cos(t * o.oS + o.oP) * o.oR;
          const oy = Math.sin(t * o.oS * 0.65 + o.oP) * o.oR * 0.6;
          const x  = o.bx * W + ox;
          const y  = o.by * H + oy;
          const pulse = 0.62 + 0.38 * Math.sin(t * o.pS + o.pP);
          const sz    = o.r * (0.88 + 0.12 * pulse);
          const alpha = o.a0 * pulse;

          const dd = Math.hypot(x - CX, y - CY);
          const bf = Math.max(0.1, 1 - dd / (MIND * 0.75));

          const r = Math.min(255, Math.max(0, cr + o.hShift * 0.55)) | 0;
          const g = Math.min(255, Math.max(0, cg + o.hShift * 0.28)) | 0;
          const b = Math.min(255, Math.max(0, cb + o.hShift * 0.1)) | 0;

          const gd = ctx.createRadialGradient(
            x - sz * 0.3, y - sz * 0.3, 0,
            x, y, sz * 3
          );
          gd.addColorStop(0,    `rgba(255,255,255,${alpha * bf * 0.92})`);
          gd.addColorStop(0.18, `rgba(${r},${g},${b},${alpha * bf * 0.75})`);
          gd.addColorStop(0.55, `rgba(${(r*0.5)|0},${(g*0.5)|0},${(b*0.5)|0},${alpha * bf * 0.22})`);
          gd.addColorStop(1,    'rgba(0,0,0,0)');
          ctx.beginPath();
          ctx.arc(x, y, sz * 3, 0, Math.PI * 2);
          ctx.fillStyle = gd;
          ctx.fill();
        });
        ctx.restore();

        // ── Shockwave rings ────────────────────────────────────
        if (ts - lastRing > RING_INTERVAL) {
          RINGS.push({born: ts, maxR: MIND * 0.55});
          lastRing = ts;
        }
        ctx.save();
        ctx.globalCompositeOperation = 'source-over';
        for (let i = RINGS.length - 1; i >= 0; i--) {
          const rng = RINGS[i];
          const age = (ts - rng.born) * 0.001;
          const rad = age * rng.maxR * 0.82;
          const a   = Math.max(0, 0.55 * (1 - age / 2.8));
          if (a <= 0) { RINGS.splice(i, 1); continue; }

          // Sharp inner ring
          ctx.beginPath();
          ctx.arc(CX, CY, rad, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(${cr},${cg},${cb},${a})`;
          ctx.lineWidth = 1;
          ctx.stroke();

          // Soft outer halo ring
          ctx.beginPath();
          ctx.arc(CX, CY, rad + 5, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(${cr},${cg},${cb},${a * 0.25})`;
          ctx.lineWidth = 10;
          ctx.stroke();
        }
        ctx.restore();

        // ── Central breathing halo (behind logo, additive) ────
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        const hPulse = 0.72 + 0.28 * Math.sin(t * 0.55);
        const haloR  = MIND * 0.34 * hPulse;
        const halo   = ctx.createRadialGradient(CX, CY, 0, CX, CY, haloR);
        halo.addColorStop(0,   `rgba(${cr},${cg},${cb},${0.14 * hPulse})`);
        halo.addColorStop(0.5, `rgba(${cr},${cg},${cb},${0.04 * hPulse})`);
        halo.addColorStop(1,    'rgba(0,0,0,0)');
        ctx.fillStyle = halo;
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
      }

      requestAnimationFrame(frame);
    })();

    // ── Page Background Particle System ──────────────────────────────────────
    // Runs behind the main page (page-shell), reacts to slide accent colours.
    (function () {
      const site = document.querySelector('.site');
      const cvs  = document.createElement('canvas');
      cvs.setAttribute('aria-hidden', 'true');
      cvs.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;';
      site.insertBefore(cvs, site.firstChild);
      const ctx = cvs.getContext('2d');

      let W = 0, H = 0, CX = 0, CY = 0;
      function resize() {
        W = cvs.width  = window.innerWidth;
        H = cvs.height = window.innerHeight;
        CX = W / 2; CY = H / 2;
      }
      resize();
      window.addEventListener('resize', () => { resize(); bgBooted = false; });

      // Slide-reactive accent colour — lerped on every frame
      let curAcc = [40, 110, 255];
      let tgtAcc = [40, 110, 255];
      window._bgSetAccent = function (rgb) { tgtAcc = rgb; };

      // ── Stars (220) ──
      const STARS = Array.from({length: 220}, () => ({
        nx: Math.random(), ny: Math.random(),
        r:  Math.random() * 1.0 + 0.2,
        a0: Math.random() * 0.28 + 0.07,
        tw: Math.random() * Math.PI * 2,
        ts: Math.random() * 1.0 + 0.3,
      }));

      // ── Flow particles (160) ──
      const FLOW = Array.from({length: 160}, () => ({
        x: Math.random(), y: Math.random(),
        vx: 0, vy: 0,
        r:   Math.pow(Math.random(), 1.8) * 1.6 + 0.4,
        a0:  Math.random() * 0.18 + 0.05,
        spd: Math.random() * 0.55 + 0.18,
        hist: [],
        hLen: Math.floor(Math.random() * 7 + 3),
        delay: Math.random() * 2500,
        hShift: (Math.random() - 0.5) * 45,
      }));

      // ── Large orbs (14) ──
      const ORBS = Array.from({length: 14}, () => {
        const ang = Math.random() * Math.PI * 2;
        const rn  = Math.pow(Math.random(), 0.5) * 0.5;
        return {
          bx: 0.5 + Math.cos(ang) * rn,
          by: 0.5 + Math.sin(ang) * rn * 0.7,
          r:  Math.random() * 55 + 28,
          a0: Math.random() * 0.055 + 0.015,
          oR: Math.random() * 90 + 35,
          oS: (Math.random() * 0.12 + 0.03) * (Math.random() < 0.5 ? 1 : -1),
          oP: Math.random() * Math.PI * 2,
          pS: Math.random() * 0.4 + 0.15,
          pP: Math.random() * Math.PI * 2,
        };
      });

      // ── Nebula patches (6) ──
      const NEBULA = Array.from({length: 6}, () => ({
        nx:  Math.random(), ny: Math.random(),
        r:   Math.random() * 200 + 120,
        a0:  Math.random() * 0.032 + 0.010,
        dx:  (Math.random() - 0.5) * 5,
        dy:  (Math.random() - 0.5) * 3.5,
        hShift: (Math.random() - 0.5) * 55,
        pP:  Math.random() * Math.PI * 2,
        pS:  Math.random() * 0.10 + 0.03,
      }));

      let bgBooted = false;
      function boot() {
        FLOW.forEach(p => { p.x = p.x * W; p.y = p.y * H; p.hist = []; });
        bgBooted = true;
      }

      function field(x, y, t) {
        const s = 0.0028, s2 = 0.0015;
        const vx = Math.sin(y * s + t * 0.30) + 0.5 * Math.sin(x * s2 + t * 0.17);
        const vy = Math.cos(x * s + t * 0.26) + 0.5 * Math.cos(y * s2 + t * 0.21);
        return [vx, vy];
      }

      function bgFrame(ts) {
        requestAnimationFrame(bgFrame);
        if (!W || !H) return;
        if (!bgBooted) boot();

        const t = ts * 0.001;

        // Lerp towards slide accent over ~2 s
        curAcc = curAcc.map((c, i) => c + (tgtAcc[i] - c) * 0.012);
        const [cr, cg, cb] = curAcc.map(Math.round);

        // Transparent clear — body gradient stays visible beneath
        ctx.clearRect(0, 0, W, H);

        // ── Nebula fog ──
        NEBULA.forEach(n => {
          const nx  = ((n.nx * W + t * n.dx) % W + W) % W;
          const ny  = ((n.ny * H + t * n.dy) % H + H) % H;
          const pls = 0.6 + 0.4 * Math.sin(t * n.pS + n.pP);
          const a   = n.a0 * pls;
          const r   = Math.min(255, Math.max(0, cr + n.hShift * 0.45)) | 0;
          const g   = Math.min(255, Math.max(0, cg + n.hShift * 0.25)) | 0;
          const b   = Math.min(255, Math.max(0, cb + n.hShift * 0.08)) | 0;
          const gd  = ctx.createRadialGradient(nx, ny, 0, nx, ny, n.r);
          gd.addColorStop(0,    `rgba(${r},${g},${b},${a})`);
          gd.addColorStop(0.55, `rgba(${r},${g},${b},${a * 0.22})`);
          gd.addColorStop(1,     'rgba(0,0,0,0)');
          ctx.beginPath();
          ctx.arc(nx, ny, n.r, 0, Math.PI * 2);
          ctx.fillStyle = gd;
          ctx.fill();
        });

        // ── Stars ──
        STARS.forEach(s => {
          const tw = 0.45 + 0.55 * Math.sin(t * s.ts + s.tw);
          ctx.beginPath();
          ctx.arc(s.nx * W, s.ny * H, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(185,215,255,${s.a0 * tw})`;
          ctx.fill();
        });

        // ── Flow particles ──
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        FLOW.forEach(p => {
          if (ts < p.delay) return;

          const [fx, fy] = field(p.x, p.y, t);
          p.vx = p.vx * 0.88 + fx * p.spd * 0.12;
          p.vy = p.vy * 0.88 + fy * p.spd * 0.12;
          p.x  += p.vx;
          p.y  += p.vy;

          if (p.x < -10) p.x = W + 10; else if (p.x > W + 10) p.x = -10;
          if (p.y < -10) p.y = H + 10; else if (p.y > H + 10) p.y = -10;

          p.hist.push({x: p.x, y: p.y});
          if (p.hist.length > p.hLen) p.hist.shift();

          const r = Math.min(255, Math.max(0, cr + p.hShift * 0.5)) | 0;
          const g = Math.min(255, Math.max(0, cg + p.hShift * 0.25)) | 0;
          const b = Math.min(255, Math.max(0, cb + p.hShift * 0.08)) | 0;

          // Trail
          if (p.hist.length > 1) {
            for (let i = 1; i < p.hist.length; i++) {
              const prog = i / p.hist.length;
              ctx.beginPath();
              ctx.moveTo(p.hist[i-1].x, p.hist[i-1].y);
              ctx.lineTo(p.hist[i].x,   p.hist[i].y);
              ctx.strokeStyle = `rgba(${r},${g},${b},${prog * prog * p.a0 * 0.22})`;
              ctx.lineWidth   = p.r * prog * 0.7;
              ctx.stroke();
            }
          }

          // Glowing head
          const gd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4.5);
          gd.addColorStop(0,   `rgba(255,255,255,${p.a0 * 0.75})`);
          gd.addColorStop(0.3, `rgba(${r},${g},${b},${p.a0 * 0.45})`);
          gd.addColorStop(1,    'rgba(0,0,0,0)');
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r * 4.5, 0, Math.PI * 2);
          ctx.fillStyle = gd;
          ctx.fill();
        });
        ctx.restore();

        // ── Large orbs ──
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ORBS.forEach(o => {
          const ox    = Math.cos(t * o.oS + o.oP) * o.oR;
          const oy    = Math.sin(t * o.oS * 0.65 + o.oP) * o.oR * 0.55;
          const x     = o.bx * W + ox;
          const y     = o.by * H + oy;
          const pulse = 0.58 + 0.42 * Math.sin(t * o.pS + o.pP);
          const alpha = o.a0 * pulse;
          const gd    = ctx.createRadialGradient(x, y, 0, x, y, o.r * 2.8);
          gd.addColorStop(0,   `rgba(${cr},${cg},${cb},${alpha * 0.85})`);
          gd.addColorStop(0.45,`rgba(${cr},${cg},${cb},${alpha * 0.20})`);
          gd.addColorStop(1,    'rgba(0,0,0,0)');
          ctx.beginPath();
          ctx.arc(x, y, o.r * 2.8, 0, Math.PI * 2);
          ctx.fillStyle = gd;
          ctx.fill();
        });
        ctx.restore();
      }

      requestAnimationFrame(bgFrame);
    })();

    let index = 0;
    let direction = 1;
    let isLocked = false;
    let showLoader = true;
    let touchStartY = null;

    function renderProgress() {
      progress.innerHTML = '';
      slides.forEach((slide, slideIndex) => {
        const item = document.createElement('div');
        item.className = `progress-item ${slideIndex === index ? 'active' : ''}`;
        item.innerHTML = `<div class="progress-line"></div><div class="progress-num">${slide.tag}</div>`;
        progress.appendChild(item);
      });
    }

    function renderCopy() {
      const active = slides[index];
      slideTag.textContent = active.tag;
      slideTitle.textContent = active.title;
      slideSubtitle.textContent = active.subtitle;

      copyBlock.className = `copy-enter ${direction > 0 ? '' : 'copy-down'}`;
      copyBlock.offsetHeight;
      copyBlock.className = `copy-enter ${direction > 0 ? '' : 'copy-down'}`;
    }

    function buildSlide(slide, dir) {
      const el = document.createElement('div');
      el.className = `slide ${dir > 0 ? '' : 'slide-down'}`;

      const glow = document.createElement('div');
      glow.className = 'slide-glow';
      glow.style.background = slide.glow;

      const rings = document.createElement('div');
      rings.className = 'slide-rings';
      [12, 24, 36, 48].forEach((size, ringIndex) => {
        const ring = document.createElement('div');
        ring.className = 'slide-ring';
        ring.style.width = `${size}rem`;
        ring.style.height = `${size}rem`;
        ring.style.animationDuration = `${2.85 + ringIndex * 0.45}s`;
        rings.appendChild(ring);
      });

      if (!slide.image) {
        const parts = [
          ['slide-bg', slide.accent],
          ['slide-floaters', 'radial-gradient(circle at 20% 20%, rgba(255,255,255,0.1), transparent 18%), radial-gradient(circle at 80% 30%, rgba(255,255,255,0.08), transparent 16%), radial-gradient(circle at 50% 80%, rgba(255,255,255,0.08), transparent 14%)'],
        ];
        parts.forEach(([cls, bg]) => {
          const div = document.createElement('div');
          div.className = cls;
          div.style.background = bg;
          el.appendChild(div);
        });
      }

      if (slide.image) {
        const img = document.createElement('img');
        img.src = slide.image;
        img.alt = slide.title;
        img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;pointer-events:none;';
        el.appendChild(img);
      }

      if (!slide.image) {
        el.appendChild(glow);
        el.appendChild(rings);

        const beamAEl = document.createElement('div');
        beamAEl.className = 'slide-beam-a';
        beamAEl.style.background = slide.band;
        el.appendChild(beamAEl);

        const beamBEl = document.createElement('div');
        beamBEl.className = 'slide-beam-b';
        beamBEl.style.background = slide.band;
        el.appendChild(beamBEl);
      }

      (slide.image
        ? ['slide-v1', 'slide-v2', 'slide-v3']
        : ['slide-noise', 'slide-scan', 'slide-v1', 'slide-v2', 'slide-v3']
      ).forEach((cls) => {
        const div = document.createElement('div');
        div.className = cls;
        el.appendChild(div);
      });

      return el;
    }

    function renderSlide() {
      mainStage.innerHTML = '';
      mainStage.appendChild(buildSlide(slides[index], direction));
      renderCopy();
      renderProgress();
      // Push slide accent colour into the background particle field
      if (window._bgSetAccent && slides[index].accentRGB) {
        window._bgSetAccent(slides[index].accentRGB);
      }
    }

    function goTo(dir) {
      if (isLocked || showLoader) return;
      const next = index + dir;
      if (next < 0 || next >= slides.length) return;

      direction = dir;
      index = next;
      isLocked = true;
      hint.classList.add('hidden');
      renderSlide();

      window.setTimeout(() => {
        isLocked = false;
      }, 750);
    }

    window.addEventListener('wheel', (event) => {
      if (Math.abs(event.deltaY) < 12) return;
      goTo(event.deltaY > 0 ? 1 : -1);
    }, { passive: true });

    window.addEventListener('keydown', (event) => {
      const tag = document.activeElement.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA') return;
      if (['ArrowDown', 'PageDown', ' '].includes(event.key)) {
        event.preventDefault();
        goTo(1);
      }
      if (['ArrowUp', 'PageUp'].includes(event.key)) {
        event.preventDefault();
        goTo(-1);
      }
    });

    window.addEventListener('touchstart', (event) => {
      touchStartY = event.touches[0].clientY;
    }, { passive: true });

    window.addEventListener('touchend', (event) => {
      if (touchStartY == null) return;
      const endY = event.changedTouches[0].clientY;
      const delta = touchStartY - endY;
      if (Math.abs(delta) > 40) {
        goTo(delta > 0 ? 1 : -1);
      }
      touchStartY = null;
    }, { passive: true });

    function startLoader() {
      const minDelay = 5000;
      const start = Date.now();

      function finish() {
        const elapsed = Date.now() - start;
        const remaining = Math.max(0, minDelay - elapsed);

        window.setTimeout(() => {
          loader.classList.add('exiting');
          pageShell.classList.remove('hidden');
          pageShell.classList.add('visible', 'assembling');

          window.setTimeout(() => {
            loader.classList.remove('visible');
            loader.classList.add('hidden');
            showLoader = false;
          }, 1050);

          window.setTimeout(() => {
            pageShell.classList.remove('assembling');
          }, 1900);
        }, remaining);
      }

      if (document.readyState !== 'loading') {
        finish();
      } else {
        window.addEventListener('DOMContentLoaded', finish, { once: true });
      }
    }

// ── Contact Modal ──
    // To activate email delivery:
    // 1. Go to https://formspree.io and sign up free
    // 2. Create a new form pointed at dedpulr6s@gmail.com
    // 3. Replace 'YOUR_FORM_ID' below with the ID they give you (e.g. "xabcdefg")
    const FORMSPREE_ID = 'mnjwpwqw';

    const contactModal = document.getElementById('contactModal');
    const contactBtn   = document.getElementById('contactBtn');
    const modalClose   = document.getElementById('modalClose');
    const contactForm  = document.getElementById('contactForm');
    const formSubmit   = document.getElementById('formSubmit');
    const formFeedback = document.getElementById('formFeedback');

    function openModal() { contactModal.classList.add('open'); }
    function closeModal() {
      contactModal.classList.remove('open');
      formFeedback.textContent = '';
      formFeedback.className = 'form-feedback';
      contactForm.reset();
      formSubmit.disabled = false;
      formSubmit.textContent = 'Send Message';
    }

    contactBtn.addEventListener('click', openModal);
    modalClose.addEventListener('click', closeModal);
    contactModal.addEventListener('click', (e) => { if (e.target === contactModal) closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    contactForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      formSubmit.disabled = true;
      formSubmit.textContent = 'Sending...';
      formFeedback.textContent = '';
      formFeedback.className = 'form-feedback';

      try {
        const res = await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
          method: 'POST',
          headers: { 'Accept': 'application/json' },
          body: new FormData(contactForm),
        });
        if (res.ok) {
          formFeedback.textContent = "Message sent! We'll be in touch soon.";
          formFeedback.className = 'form-feedback success';
          contactForm.reset();
          formSubmit.textContent = 'Sent ✓';
        } else {
          throw new Error('Server error');
        }
      } catch {
        formFeedback.textContent = 'Something went wrong. Please try again.';
        formFeedback.className = 'form-feedback error';
        formSubmit.disabled = false;
        formSubmit.textContent = 'Send Message';
      }
    });

    renderSlide();
    startLoader();
  </script>
</body>
</html>
